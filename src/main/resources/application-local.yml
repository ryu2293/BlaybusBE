spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/blaybus?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    # Hibernate DDL이 먼저 실행된 뒤 data.sql이 실행되도록 순서 보장
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: always
      platform: mysql

  # S3 자동 구성 비활성화 (LocalS3Service Mock 사용)
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
      - io.awspring.cloud.autoconfigure.s3.S3TransferManagerAutoConfiguration
      - io.awspring.cloud.autoconfigure.s3.S3CrtAsyncClientAutoConfiguration

# Firebase credentials 미설정 → FirebaseConfig에서 자동으로 skip 처리
firebase:
  credentials-path:

# JWT 설정 (로컬 테스트용)
jwt:
  secret: local-test-secret-key-must-be-at-least-32-characters-long
